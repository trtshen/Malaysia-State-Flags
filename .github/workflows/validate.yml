name: Validate assets

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install ImageMagick
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install imagemagick
      - name: Show tool versions
        run: |
          node --version
          magick -version
      - name: Rebuild generated assets and documentation
        run: |
          npm run build
          npm run docs
      - name: Validate
        run: npm test
      - name: Confirm generated files are current
        run: git diff --exit-code
